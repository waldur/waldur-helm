{{- if or ( gt .Capabilities.KubeVersion.Major "1" ) ( ge .Capabilities.KubeVersion.Minor "21" ) }}
apiVersion: batch/v1
{{- else }}
apiVersion: batch/v1beta1
{{- end }}
kind: CronJob
metadata:
  name: waldur-cleanup-cronjob
spec:
  schedule: "0 5 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          {{ if .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range $i, $val := .Values.imagePullSecrets }}
            - name: {{ $val }}
            {{ end -}}
          {{ end }}
          containers:
            - name: waldur-cleanup
              {{- if .Values.waldur.imageDigest }}
              image: {{ .Values.global.imageRegistry }}/{{ .Values.waldur.imageName }}@{{ .Values.waldur.imageDigest }}
              {{- else }}
              image: {{ .Values.global.imageRegistry }}/{{ .Values.waldur.imageName }}:{{ .Values.waldur.imageTag }}
              {{- end }}
              imagePullPolicy: {{ include "waldur.imagePullPolicy" (dict "tag" .Values.waldur.imageTag "Values" .Values) }}
              args:
                - waldur-cleanup
              env:
                {{- include "waldur.credentials" . | nindent 16 }}
              resources:
                {{- toYaml .Values.cronjobResources.waldur | nindent 16 }}
              volumeMounts:
                - name: waldur-cleanup-script
                  mountPath: /usr/local/bin/waldur-cleanup
                  subPath: waldur-cleanup
          volumes:
            - name: waldur-cleanup-script
              configMap:
                name: waldur-cleanup-script-config
                defaultMode: 0755
          restartPolicy: Never
