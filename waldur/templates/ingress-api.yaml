{{- if .Values.ingress.enabled }}
{{- if or ( gt .Capabilities.KubeVersion.Major "1" ) ( ge .Capabilities.KubeVersion.Minor "19" ) }}
apiVersion: networking.k8s.io/v1
{{- else }}
apiVersion: networking.k8s.io/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: api-ingress
  annotations:
    {{ if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/enable-cors: "true"
    # This sets the file upload size limit for ingress.
    # Additional settings for file upload sizes for different endpoints are in mastermind.conf, in mastermind nginx.
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-buffer-size: {{ .Values.ingress.proxyBufferSize | default "8k" | quote }}
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,sentry-trace,baggage,X-Impersonated-User-Uuid"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Link, X-Result-Count"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Compress proxied API responses. Payloads such as /api/roles/ are mostly
      # repeated permission-enum strings and shrink ~85% under gzip. ingress-nginx
      # leaves gzip off unless enabled on the controller ConfigMap; enabling it
      # per-location here keeps it scoped to the API and consistent across clusters.
      gzip on;
      gzip_proxied any;
      gzip_types application/json application/javascript text/css text/plain application/xml;
      gzip_min_length 256;
      gzip_comp_level 5;
    {{ if .Values.ingress.whitelistSourceRange }}
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ .Values.ingress.whitelistSourceRange }}"
    {{ end }}
    {{ else if or (eq .Values.ingress.className "openshift-default") (eq .Values.ingress.className "haproxy") }}
    haproxy.org/cors-enable: "true"
    haproxy.org/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,sentry-trace,baggage,X-Impersonated-User-Uuid"
    haproxy.org/cors-expose-headers: "Link, X-Result-Count"
    haproxy.org/ssl-redirect: "true"
    # Compress proxied API responses (see the nginx branch above for rationale).
    # These annotations are honoured by the haproxytech ingress controller
    # (className "haproxy"). The native OpenShift router (className
    # "openshift-default") ignores them — it has no per-route compression
    # annotation; compression there is cluster-scoped and must be enabled on the
    # IngressController via spec.httpCompression.mimeTypes (ROUTER_COMPRESSION_MIME).
    haproxy.org/compression-algo: "gzip"
    haproxy.org/compression-type: "application/json application/javascript text/css text/plain application/xml"
    {{ if and .Values.ingress.tls.enabled (.Values.ingress.tls.source | eq "cluster") }}
    route.openshift.io/termination: "edge"
    {{ end }}
    {{ if .Values.ingress.whitelistSourceRange }}
    haproxy.org/allow-list: "{{ .Values.ingress.whitelistSourceRange }}"
    {{ end }}
    {{ else if eq .Values.ingress.className "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-api-chain@kubernetescrd"
    {{ end }}
    {{ if and .Values.ingress.tls.enabled (eq .Values.ingress.tls.source "letsEncrypt") }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuerName | default "letsencrypt-prod-issuer" }}
    {{ end }}
    {{- include "waldur.ingressAnnotations" . }}
spec:
  {{ if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{ end }}
  rules:
  {{ if .Values.localApiHostname }}
  - host: {{ .Values.localApiHostname }}
  {{ else }}
  - host: {{ .Values.apiHostname }}
  {{ end }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
      - path: /api-auth
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
      - path: /health-check
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
  {{ if .Values.apiExtraHosts }}
  {{- range .Values.apiExtraHosts }}
  - host: {{ . }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
      - path: /api-auth
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
      - path: /health-check
        pathType: Prefix
        backend:
          service:
            name: waldur-mastermind-api
            port:
              number: 80
  {{- end }}
  {{ end }}
  {{ if and .Values.ingress.tls.enabled (.Values.ingress.tls.source | ne "cluster") }}
  tls:
  - hosts:
    - {{ .Values.apiHostname }}
    {{ if .Values.apiExtraHosts }}
    {{- range .Values.apiExtraHosts }}
    - {{ . }}
    {{- end }}
    {{ end }}
    {{ if .Values.ingress.tls.customMastermindSecretName }}
    secretName: {{ .Values.ingress.tls.customMastermindSecretName | quote }}
    {{ else }}
    secretName: api-certificate
    {{ end }}
  {{ end }}
{{ end }}
