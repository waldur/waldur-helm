{{- if and .Values.matrixChat.enabled .Values.matrixChat.livekit.enabled }}
{{- $k := .Values.matrixChat.livekit.keys }}
{{- if and (not $k.existingSecret.name) (not (and $k.apiKey $k.apiSecret)) }}
{{- fail "matrixChat.livekit is enabled but no API credentials are set. livekit-server would start with no signing key and lk-jwt-service would reference a non-existent Secret, so calls fail at runtime with no render-time hint. Set keys.apiKey + keys.apiSecret, or point keys.existingSecret.name at your own Secret." }}
{{- end }}
{{- if and $k.apiKey $k.apiSecret (not $k.existingSecret.name) }}
{{- if lt (len $k.apiSecret) 32 }}
{{- fail "matrixChat.livekit.keys.apiSecret must be at least 32 characters. livekit-server only logs a warning for short secrets and starts anyway, shipping a weak signing key to prod. Generate a strong secret (e.g. `openssl rand -hex 32`) or supply one via keys.existingSecret." }}
{{- end }}
# Chart-managed LiveKit API credentials, created from keys.apiKey/apiSecret.
# Skipped when keys.existingSecret.name points at an externally-managed Secret.
# lk-jwt-service must reference this same Secret so both sides share the key.
apiVersion: v1
kind: Secret
metadata:
  name: livekit-secret
  labels:
{{ include "waldur.labels" . | indent 4 }}
type: Opaque
stringData:
  # LiveKit server reads keys as a single "apikey: secret" string via LIVEKIT_KEYS.
  LIVEKIT_KEYS: {{ printf "%s: %s" $k.apiKey $k.apiSecret | quote }}
  # Individual values for lk-jwt-service (which signs JWTs with key + secret).
  LIVEKIT_API_KEY: {{ $k.apiKey | quote }}
  LIVEKIT_API_SECRET: {{ $k.apiSecret | quote }}
{{- end }}
{{- end }}
