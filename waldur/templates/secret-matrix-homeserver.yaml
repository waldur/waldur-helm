{{- if and .Values.matrixChat.enabled .Values.matrixChat.homeserver.enabled }}
{{- $h := .Values.matrixChat.homeserver }}
{{- if and $h.registrationToken (not $h.registrationTokenExistingSecret.name) }}
# Chart-managed secret holding the homeserver registration token. Skipped when an
# external secret is referenced via registrationTokenExistingSecret.name.
apiVersion: v1
kind: Secret
metadata:
  name: matrix-homeserver-secret
  labels:
{{ include "waldur.labels" . | indent 4 }}
type: Opaque
stringData:
  registration_token: {{ $h.registrationToken | quote }}
{{- end }}
{{- end }}
