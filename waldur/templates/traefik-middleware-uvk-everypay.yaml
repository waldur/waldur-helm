{{- if and .Values.ingress.enabled .Values.waldur.uvkEverypay.enabled (eq .Values.ingress.className "traefik") }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: uvk-everypay-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: uvk-everypay-rewrite
spec:
  replacePathRegex:
    regex: ^/uvk-everypay/(.*)
    replacement: /$1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: uvk-everypay-chain
spec:
  chain:
    middlewares:
      - name: uvk-everypay-redirect-https
      - name: uvk-everypay-rewrite
{{- end }}
