# Default values for waldur.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount:
  homeport: 1
  api: 1
  worker: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

apiScheme: "http"
homeportScheme: "http"

apiHostname: waldur.local
localApiHostname: ""
apiExtraHosts: []

homeportHostname: waldur.local
localHomeportHostname: ""
homeportExtraHosts: []

affinity: {}

apiResources:
  requests:
    cpu: 500m
    memory: 2000Mi
  limits:
    cpu: 1000m
    memory: 4000Mi

workerResources:
  requests:
    cpu: 1000m
    memory: 2000Mi
  limits:
    cpu: 2000m
    memory: 4000Mi

homeportResources:
  requests:
    cpu: 250m
    memory: 500Mi
  limits:
    cpu: 500m
    memory: 1000Mi

beatResources:
  requests:
    cpu: 250m
    memory: 500Mi
  limits:
    cpu: 500m
    memory: 1000Mi
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after '*resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

cronjobResources:
  waldur:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  postgres:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

waldurCleanupCronjob:
  backoffLimit: 0
  activeDeadlineSeconds: 1800 # Marked as failed after 30 minutes
  ttlSecondsAfterFinished: 86400 # Deleted after 24 hours

hpa:
  api:
    enabled: false
    resources:
      requests:
        cpu: 500m
    cpuUtilizationBorder: 70
  celery:
    enabled: false
    workerResources:
      requests:
        cpu: 2000m
    beatResources:
      requests:
        cpu: 300m
    cpuUtilizationBorder: 80

nodeSelector: {}

tolerations: []

ingress:
  enabled: true
  # Supported values: nginx, haproxy, openshift-default and traefik
  className: "nginx"
  tls:
    enabled: false
    source: "secret" # Possible values: `letsEncrypt`, `secret` and `cluster` (works for OpenShift only)
    clusterIssuerName: "letsencrypt-prod-issuer" # ClusterIssuer name for cert-manager (used when source == `letsEncrypt`), default: "letsencrypt-prod-issuer"
    createClusterIssuer: false # Set to true only if you have cluster-admin permissions to create ClusterIssuer resources
    customMastermindSecretName: ""
    customHomeportSecretName: ""
    secretsDir: "tls" # Enabled only if source == `secret`
  proxyBufferSize: "8k" # Nginx proxy buffer size for upstream response headers. Increase if you get 502 errors due to long pagination Link headers.
  whitelistSourceRange: "" # E.g. '192.168.22.0/24'
  whitelistSourceRangeAdmin: ""
  # Extra annotations merged onto every rendered Ingress object (api, api-admin,
  # homeport, rmq-ws, uvk-everypay). Useful for cross-cutting concerns that the
  # chart does not template natively — for example, controlling DNS TTL via
  # external-dns. Values must be strings (YAML annotation requirement).
  # Example:
  #   annotations:
  #     external-dns.alpha.kubernetes.io/ttl: "60"
  #     external-dns.alpha.kubernetes.io/hostname: "api.example.com"
  annotations: {}

celery:
  worker:
    enabled: true
  resultDatabase: "celery_results" # Database name for Celery results, default: "celery_results"
  concurrency: 10  # CELERYD_CONCURRENCY (number of worker child processes per pod)

# Gunicorn process tuning for the mastermind API container.
# Each non-empty value is appended to GUNICORN_CMD_ARGS, which gunicorn reads at startup.
# Leave fields empty to keep the gunicorn.conf.py defaults baked into the image.
gunicorn:
  timeout: ""              # --timeout (seconds); default 30
  gracefulTimeout: ""      # --graceful-timeout (seconds)
  workers: ""              # --workers; gunicorn.conf.py default is 4
  keepalive: ""            # --keep-alive (seconds); default 2
  maxRequests: ""          # --max-requests (recycle worker after N requests; 0 disables)
  maxRequestsJitter: ""    # --max-requests-jitter
  extraArgs: ""            # raw passthrough, appended verbatim

# Per-deployment extension hooks (api, worker, beat, homeport).
# Defaults are empty so the rendered output is identical to the baseline chart.
# All keys follow the Bitnami common-chart vocabulary.
api:
  extraEnvVars: []         # list of EnvVar (name/value or name/valueFrom)
  extraEnvVarsCM: ""       # single ConfigMap name (rendered as envFrom.configMapRef)
  extraEnvVarsSecret: ""   # single Secret name    (rendered as envFrom.secretRef)
  extraVolumes: []         # list of Volume appended to the pod spec
  extraVolumeMounts: []    # list of VolumeMount appended to the container
  podAnnotations: {}
  podLabels: {}

worker:
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

beat:
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

homeport:
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  podAnnotations: {}
  podLabels: {}

proxy:
  httpsProxy: ""
  httpProxy: ""
  noProxy: ""

